trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

variables:
  # REQUIRED: create an Azure Resource Manager service connection and put its name here.
  - name: azureServiceConnection
    value: 'AZURE-SC-NAME'
  # REQUIRED: existing Azure Container Registry name (not login server).
  - name: acrName
    value: 'myacr'
  - name: apiRepository
    value: 'project1-api'
  - name: pipelineRepository
    value: 'project1-idp-pipeline'
  - name: imageTag
    value: '$(Build.BuildId)'

stages:
  - stage: Build
    displayName: Build & push container images
    jobs:
      - template: templates/build-images.yml
        parameters:
          azureServiceConnection: $(azureServiceConnection)
          acrName: $(acrName)
          apiRepository: $(apiRepository)
          pipelineRepository: $(pipelineRepository)
          imageTag: $(imageTag)

